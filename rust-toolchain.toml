# Pins the toolchain used across the workspace, and ensures the wasm32 target is
# available for the reproducible rmux-web-crypto WASM build
# (scripts/build-web-crypto-wasm.sh). The byte-level determinism of that blob is
# anchored by FOUR inputs: the exact rustc (codegen changes between stable
# releases), wasm-opt being disabled in crates/rmux-web-crypto/Cargo.toml, the
# wasm-bindgen version in Cargo.lock, AND — the dominant input — wasm-pack's PINNED
# prebuilt wasm-bindgen 0.2.118 binary that emits the final .wasm/.js. A source-built
# wasm-bindgen-cli of the same version produces a DIFFERENT .wasm, so reproduction
# must use wasm-pack's prebuilt path with no conflicting wasm-bindgen on PATH. The
# rustc that reproduces the shipped blob is
# recorded in rmux-web-share's PROVENANCE.json (toolchain.rustc) and pinned both by
# the CI wasm-crypto job and by rmux-web-share's cross-repo
# verify-wasm-from-source.mjs gate (via RUSTUP_TOOLCHAIN). A local rebuild must use
# that same rustc to match byte-for-byte; this floating "stable" is for the rest of
# the workspace, not a guarantee the wasm reproduces on an arbitrary stable.
[toolchain]
channel = "stable"
targets = ["wasm32-unknown-unknown"]
